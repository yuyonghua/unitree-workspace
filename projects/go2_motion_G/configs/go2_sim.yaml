# go2_motion_G 仿真配置
# 配合 unitree_mujoco/simulate_python/unitree_mujoco.py 使用
# 仿真器需要配置: DOMAIN_ID=1, INTERFACE="lo", ROBOT="go2"

# ---- 运行模式 ----
mode: "sim"

# ---- DDS 通信 ----
# 与 unitree_mujoco config.py 保持一致
domain_id: 1
interface: "lo"
use_crc: false
lowcmd_topic: "rt/lowcmd"
lowstate_topic: "rt/lowstate"

# ---- 控制参数 ----
control_dt: 0.02  # 50Hz, 与仿真器的 decimation=10 × dt=0.002 匹配

kps: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

# Go2 默认站立角度 (模型顺序: FL, FR, RL, RR)
default_angles: [
  0.1,  0.8,  -1.5,   # FL: hip, thigh, calf
 -0.1,  0.8,  -1.5,   # FR
  0.1,  1.0,  -1.5,   # RL
 -0.1,  1.0,  -1.5    # RR
]

# ---- 关节映射 ----
# 注意：unitree_mujoco 的 sensor 和 actuator 顺序由于 go2.xml 定义为 FR, FL, RR, RL
# 因此需要和真机一模一样的逆映射，才能转换回模型所需的 FL, FR, RL, RR 顺序
joint2motor_idx: [3, 4, 5, 0, 1, 2, 9, 10, 11, 6, 7, 8]

# ---- RL 策略参数 ----
# 默认使用 go2_rl_gym 的预训练 MoE 模型 (symlink 到 models/ 目录)
policy_path: "{PROJECT_ROOT}/models/go2_policy.pt"

num_obs: 45
num_actions: 12

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [3.0, 2.0, 0.5]
max_cmd: [2.0, 1.0, 2.5]

# ---- 安全参数 ----
standup_time: 2.0  # 站立过渡时间 (秒)
