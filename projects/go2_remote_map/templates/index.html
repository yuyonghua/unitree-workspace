<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Go2 遥控建图</title>
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #111;
  color: #eee;
  font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  -webkit-user-select: none; user-select: none;
  touch-action: none;
}

/* ========== 布局 ========== */
#app {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
}

/* 顶部状态栏 */
#status-bar {
  height: 36px; line-height: 36px;
  background: #1a1a1a;
  display: flex; align-items: center;
  padding: 0 12px;
  font-size: 13px;
  flex-shrink: 0;
  gap: 10px;
}
#status-bar .badge {
  padding: 2px 8px; border-radius: 4px; font-size: 12px;
}
.badge.on { background: #2d6a2d; color: #8f8; }
.badge.off { background: #6a2d2d; color: #f88; }
.badge.info { background: #2d4a6a; color: #8cf; }

/* 雷达预览区 */
#map-area {
  flex: 1; position: relative;
  background: #000;
  overflow: hidden;
}
#map-canvas {
  width: 100%; height: 100%;
  display: block;
}
#map-overlay {
  position: absolute; top: 8px; left: 10px;
  font-size: 12px; color: #0f0; opacity: 0.7;
}

/* 底部控制区 */
#control-area {
  height: 220px; flex-shrink: 0;
  display: flex;
  background: #1a1a1a;
  border-top: 1px solid #333;
}

/* 左侧: 按钮 */
#btn-panel {
  width: 140px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  gap: 10px; padding: 10px;
  border-right: 1px solid #333;
}
#btn-panel button {
  width: 110px; height: 44px;
  border: 1px solid #555; border-radius: 8px;
  background: #2a2a2a; color: #ddd;
  font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#btn-panel button:active {
  background: #444;
}
#btn-panel button.primary {
  background: #1a5276; border-color: #2980b9;
}
#btn-panel button.danger {
  background: #6a2d2d; border-color: #c0392b;
}
#btn-panel button.active {
  background: #2d6a2d; border-color: #27ae60;
}

/* 右侧: 摇杆 */
#joystick-area {
  flex: 1; position: relative;
}

/* 连接面板 (弹出) */
#connect-panel {
  display: none;
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 100;
  justify-content: center; align-items: center;
}
#connect-panel.show { display: flex; }
#connect-form {
  background: #222; padding: 20px; border-radius: 12px;
  width: 300px;
}
#connect-form h3 { margin-bottom: 12px; text-align: center; }
#connect-form label { display: block; margin-top: 8px; font-size: 13px; color: #aaa; }
#connect-form input, #connect-form select {
  width: 100%; padding: 8px; margin-top: 4px;
  border: 1px solid #444; border-radius: 6px;
  background: #333; color: #eee; font-size: 14px;
}
#connect-form .row { display: flex; gap: 8px; margin-top: 14px; }
#connect-form .row button {
  flex: 1; padding: 10px; border: none; border-radius: 6px;
  font-size: 14px; cursor: pointer;
}
#connect-form .row button.ok { background: #2980b9; color: #fff; }
#connect-form .row button.cancel { background: #555; color: #ddd; }
</style>
</head>
<body>
<div id="app">

  <!-- 顶部状态栏 -->
  <div id="status-bar">
    <span id="conn-badge" class="badge off">未连接</span>
    <span id="lidar-badge" class="badge off">雷达关</span>
    <span style="flex:1"></span>
    <button id="btn-settings" style="background:none;border:1px solid #555;color:#aaa;border-radius:4px;padding:2px 8px;font-size:12px;">⚙ 连接</button>
  </div>

  <!-- 雷达预览 -->
  <div id="map-area">
    <canvas id="map-canvas"></canvas>
    <div id="map-overlay">点数: <span id="pt-count">0</span> | 帧: <span id="frame-count">0</span></div>
  </div>

  <!-- 底部控制 -->
  <div id="control-area">
    <div id="btn-panel">
      <button id="btn-stand-up" class="primary">站起</button>
      <button id="btn-stand-down">趴下</button>
      <button id="btn-lidar-toggle">启动雷达</button>
      <button id="btn-stop" class="danger">急停</button>
    </div>
    <div id="joystick-area"></div>
  </div>

  <!-- 连接设置弹窗 -->
  <div id="connect-panel">
    <div id="connect-form">
      <h3>连接设置</h3>
      <label>模式</label>
      <select id="inp-mode">
        <option value="remote">Remote (远程)</option>
        <option value="localsta">LocalSTA (局域网)</option>
      </select>
      <div id="grp-remote">
        <label>序列号</label>
        <input id="inp-serial" placeholder="B42N6000Q1496588">
        <label>账号</label>
        <input id="inp-user" placeholder="email@qq.com">
        <label>密码</label>
        <input id="inp-pass" type="password" placeholder="密码">
      </div>
      <div id="grp-localsta" style="display:none">
        <label>机器人 IP</label>
        <input id="inp-ip" placeholder="10.114.97.227">
      </div>
      <div class="row">
        <button class="cancel" id="btn-connect-cancel">取消</button>
        <button class="ok" id="btn-connect-ok">连接</button>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// 全局状态
// ============================================================
const STATE = {
  connected: false,
  lidarOn: false,
  joystickActive: false,
  sendTimer: null,
  stickX: 0,   // -1 ~ 1
  stickY: 0,   // -1 ~ 1
};

const SPEED = { vx: 1.0, vy: 0.6, vz: 1.0 };
const SEND_INTERVAL_MS = 50; // 20Hz

// ============================================================
// WebSocket: 运控通道
// ============================================================
let ctrlWs = null;

function ctrlConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ctrlWs = new WebSocket(`${proto}://${location.host}/ws/control`);
  ctrlWs.onopen = () => log('运控通道已连接');
  ctrlWs.onclose = () => { log('运控通道断开'); setTimeout(ctrlConnect, 3000); };
  ctrlWs.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleCtrlResp(msg);
    } catch(e) {}
  };
}

function ctrlSend(obj) {
  if (ctrlWs && ctrlWs.readyState === WebSocket.OPEN) {
    ctrlWs.send(JSON.stringify(obj));
  }
}

function handleCtrlResp(msg) {
  if (msg.connected !== undefined) {
    STATE.connected = msg.connected;
    updateUI();
  }
  if (msg.success === false) {
    log('⚠ ' + (msg.message || '操作失败'));
  }
}

// ============================================================
// WebSocket: 雷达预览通道
// ============================================================
let lidarWs = null;
let totalPoints = 0;
let totalFrames = 0;

function lidarConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  lidarWs = new WebSocket(`${proto}://${location.host}/ws/lidar`);
  lidarWs.onopen = () => log('雷达通道已连接');
  lidarWs.onclose = () => { log('雷达通道断开'); setTimeout(lidarConnect, 3000); };
  lidarWs.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'points') {
        drawPoints(msg.data);
      }
    } catch(e) {}
  };
}

// ============================================================
// Canvas 2D 雷达渲染
// ============================================================
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let allPoints = []; // 累积所有帧的点 [{x, y}, ...]
const MAX_ACCUM_POINTS = 80000;

function resizeCanvas() {
  const area = document.getElementById('map-area');
  canvas.width = area.clientWidth * window.devicePixelRatio;
  canvas.height = area.clientHeight * window.devicePixelRatio;
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  redraw();
}

function drawPoints(pts) {
  if (!pts || pts.length === 0) return;
  totalFrames++;
  totalPoints += pts.length;

  // 累积到全局数组
  for (const p of pts) {
    allPoints.push({ x: p[0], y: p[1] });
  }
  // 超出上限则截断头部
  if (allPoints.length > MAX_ACCUM_POINTS) {
    allPoints = allPoints.slice(allPoints.length - MAX_ACCUM_POINTS);
  }

  // 更新统计
  document.getElementById('pt-count').textContent = allPoints.length;
  document.getElementById('frame-count').textContent = totalFrames;

  redraw();
}

function redraw() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  if (allPoints.length === 0) return;

  // 计算包围盒
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of allPoints) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }

  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const scale = Math.min((w - 20) / rangeX, (h - 20) / rangeY);
  const offX = (w - rangeX * scale) / 2;
  const offY = (h - rangeY * scale) / 2;

  ctx.fillStyle = '#0f0';
  for (const p of allPoints) {
    const sx = (p.x - minX) * scale + offX;
    const sy = h - ((p.y - minY) * scale + offY); // Y 轴翻转
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
}

window.addEventListener('resize', resizeCanvas);

// ============================================================
// Nipplejs 虚拟摇杆
// ============================================================
function initJoystick() {
  const zone = document.getElementById('joystick-area');
  const manager = nipplejs.create({
    zone: zone,
    mode: 'static',
    position: { left: '50%', top: '50%' },
    color: 'white',
    size: 120,
    restOpacity: 0.4,
  });

  manager.on('move', (evt, data) => {
    if (!data || !data.vector) return;

    // nipplejs: forward = +y, right = +x
    // 映射到机器人坐标: x=前后(+前), y=左右(+左), yaw=旋转(+逆时针)
    const angle = data.angle.radian;
    const force = Math.min(data.force, 2) / 2; // 归一化 0~1
    const dist = data.distance;

    // 取 vector (x: -1~1 right, y: -1~1 up)
    STATE.stickX = data.vector.x * force; // 右为正
    STATE.stickY = data.vector.y * force; // 前为正

    // 开启定时器 (首次偏离中心时)
    if (!STATE.joystickActive) {
      STATE.joystickActive = true;
      startHeartbeat();
    }
  });

  manager.on('end', () => {
    STATE.stickX = 0;
    STATE.stickY = 0;
    STATE.joystickActive = false;
    stopHeartbeat();

    // 发送一次刹车
    ctrlSend({ x: 0, y: 0, yaw: 0 });
  });
}

function startHeartbeat() {
  if (STATE.sendTimer) return;
  STATE.sendTimer = setInterval(() => {
    // stickY → x (前后), stickX → y (左右取反), yaw 暂不映射
    const x = STATE.stickY * SPEED.vx;
    const y = -STATE.stickX * SPEED.vy;
    const yaw = 0; // 单摇杆, 不控制旋转
    ctrlSend({ x, y, yaw });
  }, SEND_INTERVAL_MS);
}

function stopHeartbeat() {
  if (STATE.sendTimer) {
    clearInterval(STATE.sendTimer);
    STATE.sendTimer = null;
  }
}

// ============================================================
// 按钮事件
// ============================================================
document.getElementById('btn-stand-up').addEventListener('click', () => {
  ctrlSend({ action: 'stand_up' });
});

document.getElementById('btn-stand-down').addEventListener('click', () => {
  ctrlSend({ action: 'stand_down' });
});

document.getElementById('btn-stop').addEventListener('click', () => {
  ctrlSend({ action: 'stop' });
});

document.getElementById('btn-lidar-toggle').addEventListener('click', () => {
  if (STATE.lidarOn) {
    ctrlSend({ action: 'stop_lidar' });
    STATE.lidarOn = false;
    allPoints = [];
    totalPoints = 0;
    totalFrames = 0;
  } else {
    ctrlSend({ action: 'start_lidar' });
    STATE.lidarOn = true;
  }
  updateUI();
});

// ============================================================
// 连接设置面板
// ============================================================
const panel = document.getElementById('connect-panel');
document.getElementById('btn-settings').addEventListener('click', () => {
  panel.classList.add('show');
});
document.getElementById('btn-connect-cancel').addEventListener('click', () => {
  panel.classList.remove('show');
});

document.getElementById('inp-mode').addEventListener('change', (e) => {
  const mode = e.target.value;
  document.getElementById('grp-remote').style.display = mode === 'remote' ? '' : 'none';
  document.getElementById('grp-localsta').style.display = mode === 'localsta' ? '' : 'none';
});

document.getElementById('btn-connect-ok').addEventListener('click', () => {
  panel.classList.remove('show');

  if (STATE.connected) {
    // 先断开
    ctrlSend({ action: 'disconnect' });
    STATE.connected = false;
    STATE.lidarOn = false;
    allPoints = [];
    updateUI();
    return;
  }

  // 发送连接 (后端会使用 config.py 中的默认值, 此处暂不传参覆盖)
  log('正在连接...');
  ctrlSend({ action: 'connect' });
});

// ============================================================
// UI 更新
// ============================================================
function updateUI() {
  const cb = document.getElementById('conn-badge');
  cb.textContent = STATE.connected ? '已连接' : '未连接';
  cb.className = 'badge ' + (STATE.connected ? 'on' : 'off');

  const lb = document.getElementById('lidar-badge');
  lb.textContent = STATE.lidarOn ? '雷达开' : '雷达关';
  lb.className = 'badge ' + (STATE.lidarOn ? 'info' : 'off');

  const btnLidar = document.getElementById('btn-lidar-toggle');
  btnLidar.textContent = STATE.lidarOn ? '停止雷达' : '启动雷达';
  btnLidar.className = STATE.lidarOn ? 'active' : '';

  const btnConn = document.getElementById('btn-connect-ok');
  btnConn.textContent = STATE.connected ? '断开' : '连接';
}

function log(msg) {
  console.log('[Go2]', msg);
  document.getElementById('map-overlay').innerHTML =
    `点数: <span id="pt-count">${allPoints.length}</span> | 帧: <span id="frame-count">${totalFrames}</span> | ${msg}`;
}

// ============================================================
// 初始化
// ============================================================
resizeCanvas();
initJoystick();
ctrlConnect();
lidarConnect();
log('就绪');
</script>
</body>
</html>
