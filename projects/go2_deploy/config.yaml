# ============================================================
# Go2 RL Deploy 配置
# 参数完全对齐 go2_rl_gym/deploy 的验证值
# ============================================================

# 策略模型路径 ({PROJECT_ROOT} 会被自动替换)
policy_path: "/home/user/unitree-workspace/git/community/wty-yy/go2_moe_cts/policy.pt"

# DDS 通信 (仿真: domain_id=1, interface=lo; 真机: domain_id=0, interface=eth0)
domain_id: 1
interface: "lo"
lowcmd_topic: "rt/lowcmd"
lowstate_topic: "rt/lowstate"

# 控制频率
control_dt: 0.02  # 50Hz = decimation(10) * sim_dt(0.002)

# 关节映射: 模型顺序(FL,FR,RL,RR) → SDK/MuJoCo电机顺序(FR,FL,RR,RL)
# 无论仿真还是真机, go2.xml 的 actuator/sensor 顺序都是 FR,FL,RR,RL
joint2motor_idx: [3, 4, 5, 0, 1, 2, 9, 10, 11, 6, 7, 8]

# PD 增益 (与 go2_rl_gym 完全一致)
kps: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

# 站立时使用更硬的 PD 增益 (确保站稳)
standup_kp: 40.0
standup_kd: 0.6
standup_time: 2.0  # 站立过渡时间 (秒)

# 默认站立角度 (模型顺序: FL, FR, RL, RR)
default_angles: [
   0.1,  0.8, -1.5,   # FL: hip, thigh, calf
  -0.1,  0.8, -1.5,   # FR
   0.1,  1.0, -1.5,   # RL
  -0.1,  1.0, -1.5    # RR
]

# 趴下角度 (所有关节收拢)
liedown_angles: [
   0.0,  1.3, -2.5,   # FL
   0.0,  1.3, -2.5,   # FR
   0.0,  1.3, -2.5,   # RL
   0.0,  1.3, -2.5    # RR
]

# Observation 缩放 (与 go2_rl_gym 完全一致)
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [3.0, 2.0, 0.5]   # 来自 go2_rl_gym deploy_real 的实测值

# 速度指令限幅
max_cmd: [2.0, 1.0, 2.5]

# RL 策略维度
num_actions: 12
num_obs: 45
