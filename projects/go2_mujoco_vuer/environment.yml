# Conda environment for MuJoCo Go2/G1 simulation
name: mujoco-sim
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.10
  - pip
  - numpy>=1.24.0

  - pip:
    - mujoco>=3.0.0
    - fastapi>=0.100.0
    - uvicorn>=0.23.0
    - websockets>=11.0

    # Optional: Unitree SDK
    # - unitree_sdk2py

    # Optional: Vuer (for advanced 3D visualization)
    # - vuer
