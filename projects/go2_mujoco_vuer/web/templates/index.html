<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuJoCo Robot Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 300px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #0f3460;
        }

        #viewer {
            flex: 1;
            position: relative;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #e94560;
        }

        h2 {
            font-size: 1.1em;
            margin: 20px 0 10px;
            color: #0f3460;
            background: #e94560;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        select, button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }

        select {
            background: #0f3460;
            color: #fff;
        }

        button {
            background: #e94560;
            color: #fff;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff6b6b;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group button {
            flex: 1;
        }

        .btn-secondary {
            background: #0f3460;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .status {
            background: #0f3460;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }

        .status-label {
            color: #aaa;
        }

        .status-value {
            color: #4ecca3;
            font-family: monospace;
        }

        .connected {
            color: #4ecca3;
        }

        .disconnected {
            color: #e94560;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .joint-display {
            font-family: monospace;
            font-size: 0.8em;
            background: #0a0a1a;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .joint-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .joint-name {
            color: #4ecca3;
        }

        .joint-value {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <h1>MuJoCo 仿真器</h1>

            <div class="control-group">
                <label>机器人模型</label>
                <select id="robot-select">
                    <option value="go2">Unitree Go2</option>
                    <option value="g1">Unitree G1</option>
                </select>
            </div>

            <div class="control-group">
                <div class="btn-group">
                    <button id="btn-start" onclick="startSimulation()">启动仿真</button>
                    <button id="btn-stop" onclick="stopSimulation()" disabled>停止</button>
                </div>
            </div>

            <div class="control-group">
                <div class="btn-group">
                    <button class="btn-secondary" onclick="resetSimulation()">重置</button>
                    <button class="btn-secondary" onclick="standUp()">站立</button>
                </div>
            </div>

            <h2>连接状态</h2>
            <div class="status">
                <div class="status-item">
                    <span class="status-label">WebSocket:</span>
                    <span id="ws-status" class="disconnected">未连接</span>
                </div>
                <div class="status-item">
                    <span class="status-label">仿真状态:</span>
                    <span id="sim-status">未启动</span>
                </div>
                <div class="status-item">
                    <span class="status-label">当前模型:</span>
                    <span id="current-model">-</span>
                </div>
            </div>

            <h2>机器人状态</h2>
            <div class="status">
                <div class="status-item">
                    <span class="status-label">位置 (x, y, z):</span>
                    <span id="pos-value" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">速度 (vx, vy):</span>
                    <span id="vel-value" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">高度:</span>
                    <span id="height-value" class="status-value">-</span>
                </div>
            </div>

            <h2>关节角度 (rad)</h2>
            <div class="joint-display" id="joint-display">
                <div style="color: #666;">等待数据...</div>
            </div>
        </div>

        <div id="viewer">
            <div id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 20px;">正在加载 3D 视图...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Global state
        let scene, camera, renderer, controls;
        let robot = null;
        let ws = null;
        let currentState = null;

        // Robot joint configurations
        const ROBOT_CONFIGS = {
            go2: {
                joints: [
                    'FR_hip', 'FR_thigh', 'FR_calf',
                    'FL_hip', 'FL_thigh', 'FL_calf',
                    'RR_hip', 'RR_thigh', 'RR_calf',
                    'RL_hip', 'RL_thigh', 'RL_calf'
                ],
                baseColor: 0x333333,
                jointColor: 0xe94560,
            },
            g1: {
                joints: [
                    'left_hip_pitch', 'left_hip_roll', 'left_hip_yaw',
                    'left_knee', 'left_ankle_pitch', 'left_ankle_roll',
                    'right_hip_pitch', 'right_hip_roll', 'right_hip_yaw',
                    'right_knee', 'right_ankle_pitch', 'right_ankle_roll'
                ],
                baseColor: 0x2a2a2a,
                jointColor: 0x4ecca3,
            }
        };

        // Initialize Three.js scene
        function initScene() {
            const container = document.getElementById('viewer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
            camera.position.set(2, 2, 2);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7.5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x0f3460,
                roughness: 0.8,
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid
            const gridHelper = new THREE.GridHelper(20, 40, 0x1a4a8a, 0x0a0a1a);
            scene.add(gridHelper);

            // Hide loading
            document.getElementById('loading').style.display = 'none';

            // Start animation loop
            animate();

            // Handle resize
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const container = document.getElementById('viewer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Update robot pose from state
            if (robot && currentState) {
                updateRobotPose(currentState);
            }

            renderer.render(scene, camera);
        }

        // Create simplified robot model
        function createRobotModel(robotType) {
            const config = ROBOT_CONFIGS[robotType];
            if (!config) return null;

            const group = new THREE.Group();

            // Base body
            const baseGeometry = new THREE.BoxGeometry(0.4, 0.2, 0.1);
            const baseMaterial = new THREE.MeshStandardMaterial({ color: config.baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            base.castShadow = true;
            group.add(base);

            // Create legs
            const legPositions = [
                { x: 0.19, y: 0.1 },   // FR
                { x: 0.19, y: -0.1 },  // FL
                { x: -0.19, y: 0.1 },  // RR
                { x: -0.19, y: -0.1 }, // RL
            ];

            legPositions.forEach((pos, i) => {
                const leg = createLeg(config.jointColor);
                leg.position.set(pos.x, 0, pos.y);
                leg.name = `leg_${i}`;
                group.add(leg);
            });

            return group;
        }

        function createLeg(jointColor) {
            const leg = new THREE.Group();

            // Hip joint
            const hipGeometry = new THREE.SphereGeometry(0.03, 16, 16);
            const hipMaterial = new THREE.MeshStandardMaterial({ color: jointColor });
            const hip = new THREE.Mesh(hipGeometry, hipMaterial);
            hip.castShadow = true;
            leg.add(hip);

            // Upper leg
            const upperGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.15, 8);
            const upperMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
            const upper = new THREE.Mesh(upperGeometry, upperMaterial);
            upper.position.y = -0.075;
            upper.castShadow = true;
            leg.add(upper);

            // Knee joint
            const knee = new THREE.Mesh(hipGeometry, hipMaterial);
            knee.position.y = -0.15;
            knee.castShadow = true;
            leg.add(knee);

            // Lower leg
            const lowerGeometry = new THREE.CylinderGeometry(0.015, 0.015, 0.2, 8);
            const lower = new THREE.Mesh(lowerGeometry, upperMaterial);
            lower.position.y = -0.25;
            lower.castShadow = true;
            leg.add(lower);

            // Foot
            const footGeometry = new THREE.SphereGeometry(0.025, 16, 16);
            const footMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const foot = new THREE.Mesh(footGeometry, footMaterial);
            foot.position.y = -0.35;
            foot.castShadow = true;
            leg.add(foot);

            return leg;
        }

        function updateRobotPose(state) {
            if (!robot) return;

            // Update base position
            if (state.qpos && state.qpos.length >= 3) {
                robot.position.set(state.qpos[0], state.qpos[2], -state.qpos[1]);
            }

            // Update base orientation (quaternion)
            if (state.qpos && state.qpos.length >= 7) {
                const q = state.qpos;
                robot.quaternion.set(q[4], q[6], -q[5], q[3]);
            }

            // Update leg joints based on joint positions
            if (state.joint_pos) {
                const legs = robot.children.filter(c => c.name && c.name.startsWith('leg_'));
                legs.forEach((leg, legIndex) => {
                    const baseIndex = legIndex * 3;
                    if (baseIndex + 2 < state.joint_pos.length) {
                        // Hip rotation
                        const hipAngle = state.joint_pos[baseIndex];
                        leg.rotation.x = hipAngle;

                        // Upper leg (thigh) - simplified
                        const upper = leg.children[1];
                        if (upper) {
                            upper.rotation.x = state.joint_pos[baseIndex + 1];
                        }

                        // Lower leg (calf) - simplified
                        const lower = leg.children[3];
                        if (lower) {
                            lower.rotation.x = state.joint_pos[baseIndex + 2];
                        }
                    }
                });
            }
        }

        // WebSocket connection
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('ws-status').textContent = '已连接';
                document.getElementById('ws-status').className = 'connected';
            };

            ws.onclose = () => {
                document.getElementById('ws-status').textContent = '已断开';
                document.getElementById('ws-status').className = 'disconnected';
                // Reconnect after 2 seconds
                setTimeout(connectWebSocket, 2000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state') {
                    currentState = msg.data;
                    updateDisplay(msg.data);
                } else if (msg.type === 'switch_result') {
                    if (msg.data.success) {
                        document.getElementById('current-model').textContent =
                            document.getElementById('robot-select').value.toUpperCase();
                    }
                }
            };
        }

        function updateDisplay(state) {
            // Update position
            if (state.qpos) {
                const pos = state.qpos;
                document.getElementById('pos-value').textContent =
                    `${pos[0].toFixed(3)}, ${pos[1].toFixed(3)}, ${pos[2].toFixed(3)}`;
                document.getElementById('height-value').textContent =
                    `${pos[2].toFixed(3)} m`;
            }

            // Update velocity
            if (state.qvel) {
                const vel = state.qvel;
                document.getElementById('vel-value').textContent =
                    `${vel[0].toFixed(3)}, ${vel[1].toFixed(3)}`;
            }

            // Update joint display
            if (state.joint_pos) {
                const robotType = document.getElementById('robot-select').value;
                const joints = ROBOT_CONFIGS[robotType]?.joints || [];

                let html = '';
                state.joint_pos.slice(0, joints.length).forEach((val, i) => {
                    html += `<div class="joint-row">
                        <span class="joint-name">${joints[i] || `joint_${i}`}</span>
                        <span class="joint-value">${val.toFixed(4)}</span>
                    </div>`;
                });
                document.getElementById('joint-display').innerHTML = html;
            }
        }

        // Control functions
        function startSimulation() {
            const robotType = document.getElementById('robot-select').value;

            fetch(`/api/simulation/start/${robotType}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('sim-status').textContent = '运行中';
                        document.getElementById('current-model').textContent = robotType.toUpperCase();
                        document.getElementById('btn-start').disabled = true;
                        document.getElementById('btn-stop').disabled = false;

                        // Create robot model
                        if (robot) {
                            scene.remove(robot);
                        }
                        robot = createRobotModel(robotType);
                        if (robot) {
                            robot.position.y = 0.3;
                            scene.add(robot);
                        }
                    } else {
                        alert(`启动失败: ${data.error}`);
                    }
                })
                .catch(err => console.error('Start error:', err));
        }

        function stopSimulation() {
            fetch('/api/simulation/stop', { method: 'POST' })
                .then(res => res.json())
                .then(() => {
                    document.getElementById('sim-status').textContent = '已停止';
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-stop').disabled = true;

                    if (robot) {
                        scene.remove(robot);
                        robot = null;
                    }
                });
        }

        function resetSimulation() {
            fetch('/api/simulation/reset', { method: 'POST' })
                .then(res => res.json())
                .then(() => {
                    if (robot) {
                        robot.position.set(0, 0.3, 0);
                        robot.rotation.set(0, 0, 0);
                    }
                });
        }

        function standUp() {
            // Send stand-up control command
            if (ws && ws.readyState === WebSocket.OPEN) {
                const standPos = [
                    0, 0.9, -1.8,  // FR
                    0, 0.9, -1.8,  // FL
                    0, 0.9, -1.8,  // RR
                    0, 0.9, -1.8,  // RL
                ];
                ws.send(JSON.stringify({ type: 'control', ctrl: standPos }));
            }
        }

        // Robot selection change
        document.getElementById('robot-select').addEventListener('change', (e) => {
            const newRobot = e.target.value;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'switch_robot', robot: newRobot }));

                // Recreate robot model
                if (robot) {
                    scene.remove(robot);
                }
                robot = createRobotModel(newRobot);
                if (robot) {
                    robot.position.y = 0.3;
                    scene.add(robot);
                }
            }
        });

        // Initialize
        window.onload = () => {
            initScene();
            connectWebSocket();
        };
    </script>
</body>
</html>
